# Machine-specific locations are parameterized with ${SPP_SYNC_ROOT} so this
# file stays the same for everyone. Each person sets SPP_SYNC_ROOT in their own
# .env (gitignored) to the local path where the "Market Systems - ISO Agent
# Market Updates" SharePoint library is synced, e.g.
#   SPP_SYNC_ROOT=C:/Users/<you>/OneDrive - PCI Energy Solutions/Market Systems - ISO Agent Market Updates
paths:
  cuf_dir: "${SPP_SYNC_ROOT}/SPPIM/CUF"
  suf_dir: "${SPP_SYNC_ROOT}/SPPIM/SUF"
  protocols_dir: "${SPP_SYNC_ROOT}/SPPIM/Protocols"
  recommendation_reports_dir: "${SPP_SYNC_ROOT}/SPPIM/Recommendation_Reports"
  rr_master_list_dir: "${SPP_SYNC_ROOT}/SPPIM/RR_Master_List"
  # The processing ledger (what was downloaded/analyzed, at which content hash)
  # lives in the SYNCED folder so every machine that runs the tool shares one
  # memory. Old repo-local state (data/state/metadata.json) migrates on first run.
  state_file: "${SPP_SYNC_ROOT}/State/metadata.json"
  reports_dir: data/reports
  # Final HTML report is published here (synced SharePoint "Reports" folder).
  # Market-specific subfolder: the tool is expected to expand beyond SPPIM.
  published_reports_dir: "${SPP_SYNC_ROOT}/Reports/SPPIM"
  # SPP_RR_Report_Summary-<timestamp>.xlsx (settlement Jira report) is BUILT here,
  # along with the pipeline's working artifacts (stories JSON, formula images,
  # rendered PDFs) — these internals never leave the repo.
  settlement_reports_dir: data/reports/settlement
  # The finished settlement report xlsx is COPIED here for the team (synced
  # SharePoint folder). Both Excel outputs — this report and the Jira story
  # workbooks — live in "Story templates"; the Reports folder is HTML-only
  # (Eduardo, 2026-07-16).
  published_settlement_reports_dir: "${SPP_SYNC_ROOT}/Story templates/SPPIM"
  # Miquel's Jira story workbook: the blank template the writer fills, and the
  # synced folder where filled story workbooks are published for PM review
  # (per-market subfolder, same reasoning as published_reports_dir).
  jira_template_file: templates/Jira_Story_Creator_template.xlsx
  jira_stories_dir: "${SPP_SYNC_ROOT}/Story templates/SPPIM"
  logs_dir: logs

# Maps a local synced SharePoint path to its web URL for report citations.
# sync_root is the local folder that corresponds to base_url on the web.
sharepoint:
  # base_url must match what sync_root maps to on the web. The local library
  # "Market Systems - ISO Agent Market Updates" is served at
  # "Shared Documents/ISO Agent Market Updates", so that segment is appended here.
  base_url: "https://mypci.sharepoint.com/pciteams/marketsys/Shared Documents/ISO Agent Market Updates"
  sync_root: "${SPP_SYNC_ROOT}"

report:
  # Summarization engine: "claude_code" (headless CLI, reuses your login) or "stub".
  engine: "claude_code"
  # Optional explicit path to claude.exe. If blank, the newest VSCode extension
  # build is auto-discovered. Set CLAUDE_CODE_BINARY in .env to override per machine.
  claude_code_binary: ""
  # Model passed to the headless CLI (blank = CLI default).
  model: ""

slack:
  # Two delivery options — configure ONE. Leave secrets blank here and set them
  # in .env (gitignored). A bot token + channel takes precedence over the webhook.
  #  A) Incoming Webhook URL (posts to the channel it's bound to): SLACK_WEBHOOK_URL
  webhook_url: ""
  #  B) Bot token (xoxb-…, chat:write scope) + target channel (#name or ID):
  #     SLACK_BOT_TOKEN / SLACK_CHANNEL
  bot_token: ""
  channel: ""

logging:
  level: INFO
