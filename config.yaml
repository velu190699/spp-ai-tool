paths:
  cuf_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/SPPIM/CUF"
  suf_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/SPPIM/SUF"
  protocols_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/SPPIM/Protocols"
  recommendation_reports_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/SPPIM/Recommendation_Reports"
  rr_master_list_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/SPPIM/RR_Master_List"
  state_file: data/state/metadata.json
  reports_dir: data/reports
  # Final HTML report is published here (synced SharePoint "Reports" folder).
  published_reports_dir: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates/Reports"
  # SPP_RR_Report_Summary-<timestamp>.xlsx (settlement Jira report) is written here.
  settlement_reports_dir: data/reports/settlement
  logs_dir: logs

# Maps a local synced SharePoint path to its web URL for report citations.
# sync_root is the local folder that corresponds to base_url on the web.
sharepoint:
  # base_url must match what sync_root maps to on the web. The local library
  # "Market Systems - ISO Agent Market Updates" is served at
  # "Shared Documents/ISO Agent Market Updates", so that segment is appended here.
  base_url: "https://mypci.sharepoint.com/pciteams/marketsys/Shared Documents/ISO Agent Market Updates"
  sync_root: "C:/Users/eoyarce/PCI Energy Solutions/Market Systems - ISO Agent Market Updates"

report:
  # Summarization engine: "claude_code" (headless CLI, reuses your login) or "stub".
  engine: "claude_code"
  # Optional explicit path to claude.exe. If blank, the newest VSCode extension
  # build is auto-discovered.
  claude_code_binary: "C:/Users/eoyarce/.local/bin/claude.exe"
  # Model passed to the headless CLI (blank = CLI default).
  model: ""

slack:
  # Two delivery options — configure ONE. Leave secrets blank here and set them
  # in .env (gitignored). A bot token + channel takes precedence over the webhook.
  #  A) Incoming Webhook URL (posts to the channel it's bound to): SLACK_WEBHOOK_URL
  webhook_url: ""
  #  B) Bot token (xoxb-…, chat:write scope) + target channel (#name or ID):
  #     SLACK_BOT_TOKEN / SLACK_CHANNEL
  bot_token: ""
  channel: ""

logging:
  level: INFO
