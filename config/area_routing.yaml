# PROVISIONAL area -> topic routing for the "SPP Market Changes Summary" report.
# Status: best-guess pending Kashmita Ghimire's SME review (2026-07 feedback
# meeting). Edit this file to correct routing — no code change needed; the
# report builder reads it on every run.
#
# Known corrections already applied:
# - Area renamed "Market Systems" -> "RTO Markets" (Eduardo, 2026-07-22), split
#   into FO / BO so ISO-communication vs data-only bilateral items route right.
# - WEIS / SPP West wind-down and final settlement belong to RTO Markets
#   (market settlements), NOT ETRM.
# - Bilateral changes are ambiguous by nature: the settlement/ISO-communication
#   side is RTO Markets (FO), the deal-data side is ETRM — flag in BOTH.
areas:
  rto_markets:
    name: RTO Markets
    topics:
      - FO - bilateral settlements, services, ISO Communication tasks
      - BO - settlements, charge codes, billing determinants
      - bidding, offers, mitigated offers
      - Markets+, RTOE
      - market initiative go-lives (e.g. fall/spring market changes)
      - WEIS / SPP West wind-down and final settlements
  asset_operations:
    name: Asset Operations
    topics:
      - CROW, resource adequacy, generation, outage management
  transmissions:
    name: Transmissions
    topics:
      - transmission scheduling, WebCheckout, OASIS, TPO, e-tag
      - EDAM/M+ BA
  etrm:
    name: ETRM
    topics:
      - e-tag / transmission data, deal calcs
      - bilateral settlements (data, no ISO Communication tasks; ALSO flag under RTO Markets)
  optimization:
    name: Optimization
    topics:
      - DART Trader, GenTrader, battery, forecasting

# Free-form rules appended to the routing guide verbatim. Use these for
# cross-area guidance that doesn't fit a single area's topic list.
rules:
  - Bilateral-related changes must be flagged in BOTH ETRM and RTO Markets —
    the ISO-communication/settlement side is RTO Markets (FO), the deal-data
    side is ETRM; never routed to only one of them.
  - WEIS / SPP West wind-down items (including final settlement activities) are
    RTO Markets (market settlements), not ETRM.
